<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Nossa Música ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="top-message">
    Feliz 1 ano e 7 meses meu amor! ❤️
  </div>

  <div class="background-blur"></div>

  <div class="player-container">
    <div class="card">

      <div class="carousel">
        <div class="slides">
          <img src="WhatsApp Image 2026-03-03 at 00.35.46 (1).jpeg" class="slide active" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.46 (2).jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.46.jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.47 (1).jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.47 (2).jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.47 (3).jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.47.jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.52.jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.54.jpeg" class="slide" loading="lazy">
          <img src="WhatsApp Image 2026-03-03 at 00.35.55.jpeg" class="slide" loading="lazy">
        </div>

        <button class="prev">❮</button>
        <button class="next">❯</button>

        <div class="dots">
          <span class="dot active"></span>
        </div>
      </div>

      <div class="music-info">
        <h2>Amor dos Deuses</h2>
        <p>Grupo Fundo de Quintal</p>
      </div>

      <div class="progress-container">
        <span id="current-time">0:00</span>
        <input type="range" id="progress" value="0">
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
      </div>

      <audio id="audio" src="amor dos deuses.mpeg"></audio>

    </div>
  </div>

  <div class="bottom-message">
    Obrigado por cada momento ao seu lado. Que essa música sempre lembre o nosso início e que essas fotos nunca te deixem esquecer o quão importante e especial você é para mim. Eu te amo demais ❤️
  </div>

<!-- MODAL PREMIUM -->
<div id="imageModal" class="image-modal">
  <span class="close-modal">&times;</span>

  <button class="modal-prev">&#10094;</button>
  <img class="modal-content" id="modalImg">
  <button class="modal-next">&#10095;</button>

</div>
  
  <script src="script.js"></script>
</body>
</html>
